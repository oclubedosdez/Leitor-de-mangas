<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500&display=swap" rel="stylesheet">
    <title id="titulo"></title>
    <link rel="shortcut icon" href="https://github.com/oclubedosdez.png" type="image/x-icon">
    <link rel="stylesheet" href="./src/css/estilo.css">
</head>

<body>
    <nav>
        <a href="javascript:history.go(-2)">
            <img id="logo" src="https://github.com/oclubedosdez.png" alt="">
        </a>
        <h1 id="titulo2"></h1>
    </nav>


    <header>

        <div class="select">
            <span id="titulo">modo de leitura</span>
            <div class="opcoes">
                <span id="branco" class="fechar-pagina">Passar páginas</span>
                <span id="preto" class="abrir-paginas">Páginas abertas</span>
            </div>
        </div>

        <button id="ler-no-claro" class="ler-no-claro">
            <img width="20px" src="./dark_theme.png" alt="">
        </button>

        <select placeholder="container" id="selecionar" onchange="location.href=this.value">
            <option id="cap_selecionado" selected="selected" value="1"></option>
        </select>

        <div id="botoes-de-cima">

        </div>

        </div>
    </header>


    <main>
        <div class="paginas-abertas" id="paginas">
    </main><br>
    <div class="botoes">
    </div><br><br>

</body>
<script src="./src/js/script.js"></script>
<script src="./src/js/select.js"></script>



<script>
    var titulo = document.getElementById("titulo")
    var titulo2 = document.getElementById("titulo2")
    var botoes_de_cima = document.getElementById("botoes-de-cima")
    var botoes_de_baixo = document.querySelector(".botoes")
    var cap_selecionado = document.getElementById("cap_selecionado")
    var paginas = document.getElementById("paginas")

    var number = "08" ;//capitulo atual
    var voltar = "07";//capitulo anterior
    var proximo = "09"//proximo capitulo


    let select_paginas = "";
    for (let i = 1; i <= 10; i++) {
        select_paginas += `<img src="https://oclubedosdez.github.io/Imagens/mangas/Wojia%20Laopo%20Laizi%20Yiqian%20Nian%20Qian%20%E2%80%93%20My%20Wife%20Is%20From%20a%20Thousand%20Years%20Ago/capitulo-${number}/imgs/${i.toString().padStart(2, '0')}.jpg">`;
    }
    paginas.innerHTML += select_paginas;

    cap_selecionado.innerHTML = number;

    botoes_de_cima.innerHTML = `
  <button class="botao_voltar" id="botao-voltar"><a href="./${voltar}.html">Voltar</a></button>
  <button class="botao_proximo" id="botao-proximo"><a href="./${proximo}.html">Proximo</a></button>  
`;

    botoes_de_baixo.innerHTML = `
  <a href="./${voltar}.html">&lt; Anterior</a>
  <a href="./${proximo}.html">Proximo &gt;</a>
`;

    titulo.innerHTML = `My Wife Is From a Thousand Years Ago - Capítulo ${number}`;
    titulo2.innerHTML = `My Wife Is From a Thousand Years Ago - Capítulo ${number}`;
</script>

</html>
