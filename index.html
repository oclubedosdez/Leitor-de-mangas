<script src="./Bootstrap/jquery.slim.min.js"></script>

<script src="./script.js"></script>

<script src="./swiper-bundle.min.js"></script>
<script>
  var swiper = new Swiper(".mySwiper", {
    slidesPerView: 4, // Quantidade de slides visíveis simultaneamente
    spaceBetween: 5, // Espaço entre os slides
    slidesPerGroup: 7, // Quantidade de slides a serem agrupados ao avançar/retroceder
    loop: true, // Habilitar o loop infinito
    loopFillGroupWithBlank: false, // Preencher o último grupo com slides em branco para manter a consistência
    pagination: {
      el: ".swiper-pagination", // Elemento HTML para exibir a paginação
      clickable: true, // Permitir clicar nos botões de paginação
    },
    navigation: {
      nextEl: ".swiper-button-next", // Elemento HTML para o botão de avançar
      prevEl: ".swiper-button-prev", // Elemento HTML para o botão de retroceder
    },
  });
</script>
